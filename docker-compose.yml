services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - cerodias_keys:/tmp/cerodias
      - ./data:/data
    environment:
      - ADMIN_TOKEN=cerodias-admin-9f2a4c1b7e3d8a5f
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/robots.txt"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  ssh-server:
    build:
      context: .
      dockerfile: Dockerfile.ssh
    ports:
      - "127.0.0.1:2222:22"
    volumes:
      - cerodias_keys:/tmp/cerodias
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cerodias_keys:
